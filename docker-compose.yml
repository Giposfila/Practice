services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: book_catalog
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: bookpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookuser -d book_catalog"]
      interval: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bookuser:bookpass@db:5432/book_catalog
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
